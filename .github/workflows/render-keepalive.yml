name: Render keepalive

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call keepalive endpoint
        run: |
          curl --fail --silent --show-error --max-time 30 \
            https://inbook-5bia.onrender.com/keeplive
