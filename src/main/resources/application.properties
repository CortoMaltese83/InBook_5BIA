# H2 (in-memory). Se vuoi persistente su file vedi nota sotto.
#spring.datasource.url=jdbc:h2:mem:appdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.url=jdbc:h2:file:./data/appdb;AUTO_SERVER=TRUE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver

server.port=${PORT:8080}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Link usato nelle email di verifica/invito. Configurare SMTP con spring.mail.* in produzione.
inbook.app-base-url=${INBOOK_APP_BASE_URL:http://localhost:8080}
inbook.mail.from=no-reply@inbook.local

# Lookup libri: cache locale MIM + fallback gratuite.
inbook.book-lookup.remote-enabled=true
inbook.google-books.api-key=

# Import automatico catalogo libri da Open Data MIM.
# Inserire URL CSV separati da virgola. Lo scheduler resta spento finche questo flag e false.
inbook.mim-books.scheduled-enabled=false
inbook.mim-books.schedule-cron=0 0 3 * * SUN
