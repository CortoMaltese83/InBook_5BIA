<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset password - InBook</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/login.css">
</head>

<body>
<div class="login-container">
    <div class="login-card">
        <div class="logo">
            <img src="/images/InBook2.svg" alt="InBook Logo" width="80" height="80">
        </div>
        <h1>Reset password</h1>
        <p class="subtitle">Inserisci la mail del tuo account docente.</p>

        <div class="success-alert" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="error-alert" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <form th:action="@{/password-reset/request}" method="post" class="login-form">
            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" autocomplete="username" required>
            </div>

            <button type="submit" class="submit-btn">Invia link di reset</button>
        </form>

        <div class="footer-links">
            <a href="/login">Torna al login</a>
        </div>
    </div>
</div>
</body>

</html>
