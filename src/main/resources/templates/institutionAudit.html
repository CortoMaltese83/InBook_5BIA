<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InBook - Registro attività</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="/css/institutionManager.css">
</head>

<body>
<header class="header">
    <div>
        <h1>REGISTRO ATTIVITÀ</h1>
        <span class="username" th:text="${username}">admin</span>
    </div>
    <nav class="nav">
        <a href="/admin/classes?stato=active" class="nav-link">Classi</a>
        <a href="/admin/institutions" class="nav-link">Istituti</a>
        <a href="/admin/books/import" class="nav-link">Import Libri</a>
        <a href="/admin/activity-log" class="nav-link active">Registro attività</a>
        <form class="logout-form" th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="nav-link logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
        </form>
    </nav>
</header>

<main class="main-container">
    <section class="section">
        <div class="section-header">
            <h2>Ricerca attività</h2>
            <a class="section-link" href="/admin/institutions">
                <i class="fa-solid fa-arrow-left"></i> Istituti
            </a>
        </div>

        <form class="inline-form filter-form" action="/admin/activity-log" method="get">
            <input type="search" name="search" placeholder="Cerca azione, utente, dettagli" th:value="${auditSearch}">
            <select name="action">
                <option value="">Tutte le azioni</option>
                <option th:each="auditAction : ${auditActionOptions}"
                        th:value="${auditAction.value}"
                        th:text="${auditAction.label}"
                        th:selected="${auditAction.value == selectedAction}"></option>
            </select>
            <select name="institutionId">
                <option value="">Tutti gli istituti</option>
                <option th:each="institution : ${institutions}"
                        th:value="${institution.id}"
                        th:text="${institution.name}"
                        th:selected="${selectedInstitutionId != null && institution.id == selectedInstitutionId}"></option>
            </select>
            <select name="size">
                <option value="10" th:selected="${auditSize == 10}">10 righe</option>
                <option value="25" th:selected="${auditSize == 25}">25 righe</option>
                <option value="50" th:selected="${auditSize == 50}">50 righe</option>
                <option value="100" th:selected="${auditSize == 100}">100 righe</option>
            </select>
            <button type="submit"><i class="fa-solid fa-magnifying-glass"></i> Cerca</button>
            <a class="btn-small btn-secondary" href="/admin/activity-log">Reset</a>
        </form>
    </section>

    <section class="section">
        <div class="section-header">
            <h2>Eventi</h2>
            <span class="results-summary" th:text="${auditPage.totalElements + ' eventi'}">0 eventi</span>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>Quando</th>
                    <th>Azione</th>
                    <th>Istituto</th>
                    <th>Attore</th>
                    <th>Target</th>
                    <th>Dettagli</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="event : ${auditEvents}">
                    <td th:text="${event.created_at}">-</td>
                    <td th:text="${auditActionLabels.get(event.action) != null ? auditActionLabels.get(event.action) : event.action}">azione</td>
                    <td th:text="${event.institution != null ? event.institution.name : '-'}">istituto</td>
                    <td th:text="${event.actor != null ? event.actor.email : 'sistema'}">attore</td>
                    <td th:text="${event.targetUser != null ? event.targetUser.email : '-'}">target</td>
                    <td th:text="${event.details}">dettagli</td>
                </tr>
                <tr th:if="${#lists.isEmpty(auditEvents)}">
                    <td colspan="6" class="empty">Nessuna attività registrata.</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="pager" th:if="${auditPage.totalPages > 1}">
            <a class="btn-small btn-secondary"
               th:if="${auditPage.hasPrevious()}"
               th:href="@{/admin/activity-log(search=${auditSearch}, action=${selectedAction}, institutionId=${selectedInstitutionId}, size=${auditSize}, page=${auditPage.number - 1})}">
                <i class="fa-solid fa-chevron-left"></i> Precedente
            </a>
            <span th:text="${'Pagina ' + (auditPage.number + 1) + ' di ' + auditPage.totalPages}">Pagina 1 di 1</span>
            <a class="btn-small btn-secondary"
               th:if="${auditPage.hasNext()}"
               th:href="@{/admin/activity-log(search=${auditSearch}, action=${selectedAction}, institutionId=${selectedInstitutionId}, size=${auditSize}, page=${auditPage.number + 1})}">
                Successiva <i class="fa-solid fa-chevron-right"></i>
            </a>
        </div>
    </section>
</main>
</body>

</html>
