<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InBook - ISBN Scartati</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="/css/institutionManager.css">
</head>

<body>
<header class="header">
    <div>
        <h1>ISBN SCARTATI</h1>
        <span class="username" th:text="${username}">admin</span>
    </div>
    <nav class="nav">
        <a href="/admin/classes?stato=active" class="nav-link">Classi</a>
        <a href="/admin/institutions" class="nav-link">Istituti</a>
        <a href="/admin/books/import" class="nav-link active">Import Libri</a>
        <a href="/admin/activity-log" class="nav-link">Registro attività</a>
        <form class="logout-form" th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="nav-link logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
        </form>
    </nav>
</header>

<main class="main-container">
    <section class="section">
        <div class="section-header">
            <h2 th:text="${'Run #' + run.id}">Run</h2>
            <a class="section-link" th:href="@{/admin/books/import/runs/{id}(id=${run.id})}">
                <i class="fa-solid fa-arrow-left"></i> Dettaglio run
            </a>
        </div>
        <div class="metrics-grid">
            <div><strong>Tipo errore</strong><span th:text="${group.fallbackStep != null ? group.fallbackStep : group.status}">MIM_CSV</span></div>
            <div><strong>ISBN</strong><span th:text="${group.count}">0</span></div>
        </div>
        <div class="notice error" th:text="${group.reason != null ? group.reason : 'Motivo non valorizzato.'}">Motivo</div>
    </section>

    <section class="section">
        <div class="section-header">
            <h2>Log ISBN</h2>
            <span class="results-summary" th:text="${#lists.size(discardedItems) + ' righe'}">0 righe</span>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>ISBN</th>
                    <th>Normalizzato</th>
                    <th>Libro/Riga</th>
                    <th>Titolo</th>
                    <th>URL sorgente</th>
                    <th>Quando</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${discardedItems}">
                    <td th:text="${item.isbn != null ? item.isbn : '-'}">-</td>
                    <td th:text="${item.normalizedIsbn != null ? item.normalizedIsbn : '-'}">-</td>
                    <td th:text="${item.bookId != null ? ('Libro #' + item.bookId) : (item.rowNumber != null ? ('Riga ' + item.rowNumber) : '-')}">-</td>
                    <td th:text="${item.title != null ? item.title : '-'}">-</td>
                    <td class="url-cell" th:text="${item.sourceUrl != null ? item.sourceUrl : '-'}">-</td>
                    <td th:text="${item.created_at}">-</td>
                </tr>
                <tr th:if="${#lists.isEmpty(discardedItems)}">
                    <td colspan="6" class="empty">Nessun ISBN scartato per questo motivo.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>

</html>
